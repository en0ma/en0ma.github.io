<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Construction</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: #f5f3ee;
      color: #242424;
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
    }

    main {
      width: min(90vw, 520px);
      padding: 48px 24px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2rem, 8vw, 4rem);
      line-height: 1;
    }

    p {
      margin: 0;
      color: #555;
      font-size: 1.1rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <h1>Under Construction</h1>
    <p>This site is being updated. Please check back soon.</p>
  </main>
</body>
</html>
